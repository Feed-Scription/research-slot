<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <meta name="application-name" content="Research Slot" />
    <meta name="author" content="Feed Scription" />

    <link rel="canonical" href="https://feed-scription.github.io/research-slot/" />

    <!-- 图标 + manifest -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Research Slot" />

    <meta property="og:locale" content="zh_CN" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />

    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "科研老虎机 · Research Slot",

        "applicationCategory": "GameApplication",
        "operatingSystem": "Any (web)",
        "inLanguage": ["zh-CN", "en"],
        "author": { "@type": "Organization", "name": "Feed Scription" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
